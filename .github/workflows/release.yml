name: Release Plugin

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update csproj version
        run: |
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${{ env.VERSION }}</AssemblyVersion>|" Jellyfin.Plugin.Avatars/Jellyfin.Plugin.Avatars.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${{ env.VERSION }}</FileVersion>|" Jellyfin.Plugin.Avatars/Jellyfin.Plugin.Avatars.csproj

      - name: Restore + build + test
        run: |
          dotnet restore Jellyfin.Plugin.Avatars.sln
          dotnet build Jellyfin.Plugin.Avatars.sln -c Release --no-restore
          dotnet test  Jellyfin.Plugin.Avatars.sln -c Release --no-build

      - name: Package zip
        run: |
          cd Jellyfin.Plugin.Avatars/bin/Release/net9.0
          cp ../../../../assets/banner.png . 2>/dev/null || true
          cp ../../../../LICENSE .          2>/dev/null || true
          FILES="Jellyfin.Plugin.Avatars.dll"
          [ -f banner.png ] && FILES="$FILES banner.png"
          [ -f LICENSE ]    && FILES="$FILES LICENSE"
          zip -r "Jellyfin.Plugin.Avatars-v${{ env.VERSION }}.zip" $FILES
          mv "Jellyfin.Plugin.Avatars-v${{ env.VERSION }}.zip" ../../../../

      - name: Compute MD5
        run: |
          MD5=$(md5sum "Jellyfin.Plugin.Avatars-v${{ env.VERSION }}.zip" | awk '{print $1}')
          echo "MD5=$MD5" >> $GITHUB_ENV

      - name: Update root manifest.json
        run: |
          cat <<EOF > new_version.json
          {
            "checksum": "${{ env.MD5 }}",
            "version": "${{ env.VERSION }}",
            "targetAbi": "10.11.5.0",
            "sourceUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/Jellyfin.Plugin.Avatars-v${{ env.VERSION }}.zip",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "changelog": "Release v${{ env.VERSION }}"
          }
          EOF
          jq '.[0].versions = ([input] + (.[0].versions // []))' manifest.json new_version.json > manifest.tmp
          mv manifest.tmp manifest.json
          rm new_version.json

      - name: Commit manifest.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add manifest.json Jellyfin.Plugin.Avatars/Jellyfin.Plugin.Avatars.csproj
          git commit -m "release: v${{ env.VERSION }}"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.Avatars-v${{ env.VERSION }}.zip
          name: v${{ env.VERSION }}
          draft: false
          prerelease: false

      - name: Trigger manifest-publish
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d "{\"event_type\":\"manifest-publish\",\"client_payload\":{\"version\":\"${{ env.VERSION }}\"}}"
