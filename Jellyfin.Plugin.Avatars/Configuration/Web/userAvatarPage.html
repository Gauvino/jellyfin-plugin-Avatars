<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Avatar</title>
    <style>
        .avatars-page { max-width: 960px; padding: 1em; }
        .avatars-toolbar { display: flex; gap: 0.75em; align-items: center; flex-wrap: wrap; margin-bottom: 1em; }
        .avatars-toolbar input[type="search"] {
            flex: 1 1 220px; min-height: 2.4em; padding: 0.4em 0.7em;
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.25); color: inherit;
        }
        .avatars-tabs { display: flex; gap: 0.4em; overflow-x: auto; padding-bottom: 0.5em; margin-bottom: 1em; }
        .avatars-tab {
            flex: 0 0 auto; padding: 0.5em 0.9em; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.18); background: transparent;
            color: inherit; cursor: pointer; white-space: nowrap;
            font-size: 0.92em; transition: background 0.15s, border-color 0.15s;
        }
        .avatars-tab:hover { background: rgba(255,255,255,0.06); }
        .avatars-tab.is-active { background: #52B54B; border-color: #52B54B; color: #fff; }
        .avatars-tab .count { opacity: 0.7; margin-left: 0.4em; font-size: 0.85em; }
        .avatars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 0.7em; }
        .avatar-card {
            position: relative; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden;
            border: 2px solid transparent; cursor: pointer;
            background: rgba(255,255,255,0.04);
            transition: transform 0.12s, border-color 0.12s, filter 0.12s;
            filter: grayscale(0.55) opacity(0.85);
        }
        .avatar-card:hover { transform: translateY(-2px); filter: none; }
        .avatar-card.is-selected { border-color: #52B54B; filter: none; box-shadow: 0 0 0 2px rgba(82,181,75,0.3); }
        .avatar-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-card .label {
            position: absolute; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.75) 100%);
            color: #fff; padding: 0.3em 0.5em 0.4em; font-size: 0.75em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .avatars-status { padding: 1em 0; opacity: 0.7; }
        .avatars-footer { display: flex; gap: 0.6em; margin-top: 1.2em; flex-wrap: wrap; }
    </style>
</head>

<body>
    <div data-role="page" class="page type-interior pluginConfigurationPage" data-helpurl="" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary avatars-page">
                <h1 style="margin-bottom: 0.6em;">Choose your avatar</h1>
                <p class="fieldDescription">Pick from the built-in gallery or your admin's uploads. Click an avatar to apply.</p>

                <div class="avatars-toolbar">
                    <input type="search" placeholder="Search…" data-avatars-search />
                </div>

                <div class="avatars-tabs" data-avatars-tabs></div>
                <div class="avatars-grid" data-avatars-grid></div>
                <div class="avatars-status" data-avatars-status></div>

                <div class="avatars-footer">
                    <button is="emby-button" type="button" class="raised button-cancel" data-avatars-remove>
                        <span>Remove avatar</span>
                    </button>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            (function () {
                'use strict';

                var page = document.querySelector('.avatars-page');
                if (!page) return;

                var searchInput = page.querySelector('[data-avatars-search]');
                var tabsEl = page.querySelector('[data-avatars-tabs]');
                var gridEl = page.querySelector('[data-avatars-grid]');
                var statusEl = page.querySelector('[data-avatars-status]');
                var removeBtn = page.querySelector('[data-avatars-remove]');

                var state = {
                    categories: [],
                    avatars: [],
                    activeCategory: null,
                    query: '',
                    selectedKey: null,
                    userId: null,
                };

                function avatarKey(a) { return a.kind + ':' + a.id; }
                function setStatus(text) { statusEl.textContent = text || ''; }

                function getCurrentUserId() {
                    if (window.ApiClient && typeof ApiClient.getCurrentUserId === 'function') {
                        return ApiClient.getCurrentUserId();
                    }
                    return null;
                }

                function apiUrl(path) {
                    if (window.ApiClient && typeof ApiClient.getUrl === 'function') {
                        return ApiClient.getUrl(path);
                    }
                    return '/' + path.replace(/^\/+/, '');
                }

                function authFetch(path, options) {
                    options = options || {};
                    options.headers = Object.assign({}, options.headers || {});
                    if (window.ApiClient && typeof ApiClient.accessToken === 'function') {
                        options.headers['X-Emby-Token'] = ApiClient.accessToken();
                    }
                    return fetch(apiUrl(path), options);
                }

                function renderTabs() {
                    tabsEl.innerHTML = '';
                    state.categories.forEach(function (cat) {
                        var btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'avatars-tab' + (state.activeCategory === cat.id ? ' is-active' : '');
                        btn.dataset.categoryId = cat.id;
                        btn.innerHTML = '<span>' + escapeHtml(cat.displayName) + '</span><span class="count">' + cat.count + '</span>';
                        btn.addEventListener('click', function () {
                            state.activeCategory = cat.id;
                            renderTabs();
                            renderGrid();
                        });
                        tabsEl.appendChild(btn);
                    });
                }

                function renderGrid() {
                    var query = state.query.toLowerCase();
                    var filtered = state.avatars.filter(function (a) {
                        if (state.activeCategory && a.categoryId !== state.activeCategory) return false;
                        if (!query) return true;
                        return a.displayName.toLowerCase().indexOf(query) !== -1
                            || a.id.toLowerCase().indexOf(query) !== -1;
                    });

                    gridEl.innerHTML = '';
                    if (filtered.length === 0) {
                        setStatus('No avatars match.');
                        return;
                    }
                    setStatus(filtered.length + ' avatar' + (filtered.length > 1 ? 's' : ''));

                    filtered.forEach(function (a) {
                        var card = document.createElement('div');
                        card.className = 'avatar-card' + (state.selectedKey === avatarKey(a) ? ' is-selected' : '');
                        card.title = a.displayName;
                        card.innerHTML =
                            '<img loading="lazy" src="' + a.url + '" alt="' + escapeHtml(a.displayName) + '" />' +
                            '<span class="label">' + escapeHtml(a.displayName) + '</span>';
                        card.addEventListener('click', function () { applyAvatar(a); });
                        gridEl.appendChild(card);
                    });
                }

                function loadCatalog() {
                    setStatus('Loading…');
                    return Promise.all([
                        authFetch('Avatars/Catalog/Categories').then(function (r) { return r.json(); }),
                        authFetch('Avatars/Catalog/Avatars').then(function (r) { return r.json(); }),
                    ]).then(function (results) {
                        state.categories = results[0] || [];
                        state.avatars = results[1] || [];
                        if (state.categories.length > 0 && !state.activeCategory) {
                            state.activeCategory = state.categories[0].id;
                        }
                        renderTabs();
                        renderGrid();
                    }).catch(function (err) {
                        setStatus('Could not load avatars: ' + err.message);
                    });
                }

                function loadCurrentSelection() {
                    state.userId = getCurrentUserId();
                    if (!state.userId) return Promise.resolve();
                    return authFetch('Avatars/User/' + encodeURIComponent(state.userId))
                        .then(function (r) { return r.ok ? r.json() : null; })
                        .then(function (mapping) {
                            if (mapping && mapping.kind && mapping.avatarId) {
                                state.selectedKey = mapping.kind + ':' + mapping.avatarId;
                            }
                        });
                }

                function applyAvatar(a) {
                    if (!state.userId) return;
                    setStatus('Applying ' + a.displayName + '…');
                    var body = JSON.stringify({ kind: a.kind, avatarId: a.id, userId: state.userId });
                    authFetch('Avatars/User/Set', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body,
                    }).then(function (r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        state.selectedKey = avatarKey(a);
                        renderGrid();
                        setStatus('Avatar applied. Refresh other tabs to see your new picture.');
                    }).catch(function (err) {
                        setStatus('Failed: ' + err.message);
                    });
                }

                function removeAvatar() {
                    if (!state.userId) return;
                    setStatus('Removing avatar…');
                    var body = JSON.stringify({ userId: state.userId });
                    authFetch('Avatars/User/Remove', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body,
                    }).then(function (r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        state.selectedKey = null;
                        renderGrid();
                        setStatus('Avatar cleared.');
                    }).catch(function (err) {
                        setStatus('Failed: ' + err.message);
                    });
                }

                function escapeHtml(s) {
                    var div = document.createElement('div');
                    div.textContent = s == null ? '' : String(s);
                    return div.innerHTML;
                }

                searchInput.addEventListener('input', function () {
                    state.query = searchInput.value || '';
                    renderGrid();
                });
                removeBtn.addEventListener('click', removeAvatar);

                Promise.all([loadCurrentSelection(), loadCatalog()]).catch(function () { /* status is already set */ });
            })();
        </script>
    </div>
</body>

</html>
